name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Test & Build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: genesis-web/package-lock.json

      - name: Install dependencies
        working-directory: genesis-web
        run: npm ci

      - name: Run tests
        working-directory: genesis-web
        run: npm run test

      - name: Type-check and build
        working-directory: genesis-web
        run: npm run build
