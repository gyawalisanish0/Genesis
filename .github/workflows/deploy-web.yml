name: Deploy Web

# Deploys the Vite app to GitHub Pages using the official GitHub Actions
# deployment pipeline (actions/deploy-pages).
#
# REQUIRED ONE-TIME REPO SETTING:
#   Settings → Pages → Source → "GitHub Actions"
#   (not "Deploy from a branch" — that serves the raw repo, not the built app)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      label:
        description: 'Deployment label (informational only)'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - staging

permissions:
  contents: read   # checkout
  pages:    write  # upload + deploy Pages artifact
  id-token: write  # OIDC token required by deploy-pages

# One deployment at a time; new pushes cancel any queued run.
concurrency:
  group: pages
  cancel-in-progress: true

# ── Jobs ──────────────────────────────────────────────────────────────────────

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: genesis-web/package-lock.json

      - name: Install dependencies
        working-directory: genesis-web
        run: npm ci

      - name: Run tests
        working-directory: genesis-web
        run: npm run test

      # configure-pages reads the repo's Pages settings and emits base_path
      # (e.g. /Genesis) so Vite can set absolute asset URLs correctly.
      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Build for GitHub Pages
        working-directory: genesis-web
        run: |
          echo "Building with base ${{ steps.pages.outputs.base_path }}/"
          npm run build -- --base "${{ steps.pages.outputs.base_path }}/"

      - name: Verify build output
        run: |
          if [ ! -f genesis-web/dist/index.html ]; then
            echo "ERROR: genesis-web/dist/index.html not found"
            exit 1
          fi
          echo "dist/ contents:"
          ls -lh genesis-web/dist/
          echo "Asset references in index.html:"
          grep -o 'src="[^"]*"\|href="[^"]*"' genesis-web/dist/index.html | head -20

      # upload-pages-artifact automatically adds .nojekyll so Jekyll does not
      # strip Vite's _assets/ directory (leading-underscore rule).
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: genesis-web/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Deployment summary
        run: |
          LABEL="${{ github.event.inputs.label || 'auto' }}"
          echo "### Web deployed to GitHub Pages"               >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |"                           >> $GITHUB_STEP_SUMMARY
          echo "|---|---|"                                       >> $GITHUB_STEP_SUMMARY
          echo "| Label  | \`${LABEL}\` |"                      >> $GITHUB_STEP_SUMMARY
          echo "| URL    | ${{ steps.deploy.outputs.page_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |"             >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |"        >> $GITHUB_STEP_SUMMARY
