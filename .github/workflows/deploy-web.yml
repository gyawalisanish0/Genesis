name: Deploy Web

# Deploys the Vite app to GitHub Pages via a gh-pages branch.
#
# REQUIRED REPO SETTING (one-time):
#   Settings → Pages → Source: "Deploy from a branch"
#   Branch: gh-pages   Folder: / (root)
#
# This approach is more reliable than the Actions-API deployment method:
# - No "github-pages" environment setup needed
# - Works with the standard branch-based Pages source
# - The gh-pages branch is always inspectable for debugging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      label:
        description: 'Deployment label (informational only)'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - staging

# contents: write is needed to push the gh-pages branch.
permissions:
  contents: write

# Cancel any in-flight deploy so pushes don't queue up.
concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: genesis-web/package-lock.json

      - name: Install dependencies
        working-directory: genesis-web
        run: npm ci

      - name: Run tests
        working-directory: genesis-web
        run: npm run test

      - name: Build for GitHub Pages
        working-directory: genesis-web
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          echo "Building with base /${REPO_NAME}/"
          npm run build -- --base "/${REPO_NAME}/"

      - name: Verify build output
        run: |
          if [ ! -f genesis-web/dist/index.html ]; then
            echo "ERROR: genesis-web/dist/index.html not found — build may have failed"
            exit 1
          fi
          echo "dist/ contents:"
          ls -lh genesis-web/dist/
          echo "asset references in index.html:"
          grep -o 'src="[^"]*"\|href="[^"]*"' genesis-web/dist/index.html | head -20

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: genesis-web/dist
          # enable_jekyll defaults to false, which adds .nojekyll automatically.
          # This prevents Jekyll from skipping Vite's _assets/ directory
          # (Jekyll silently drops directories whose names start with '_').

      - name: Deployment summary
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          LABEL="${{ github.event.inputs.label || 'auto' }}"
          URL="https://${OWNER}.github.io/${REPO}/"
          echo "### Web deployed to gh-pages"           >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |"                   >> $GITHUB_STEP_SUMMARY
          echo "|---|---|"                               >> $GITHUB_STEP_SUMMARY
          echo "| Label    | \`${LABEL}\` |"            >> $GITHUB_STEP_SUMMARY
          echo "| URL      | ${URL} |"                  >> $GITHUB_STEP_SUMMARY
          echo "| Commit   | \`${{ github.sha }}\` |"   >> $GITHUB_STEP_SUMMARY
          echo "| Branch   | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
