name: Deploy Android (Capacitor)

# Manual trigger only — run from Actions tab when ready to ship.
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

# ── Jobs ───────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Capacitor — Android ${{ github.event.inputs.build_type }} APK
    runs-on: ubuntu-24.04

    steps:
      # 1. Source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node — Vite build + Capacitor CLI
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: genesis-web/package-lock.json

      - name: Install Node dependencies
        working-directory: genesis-web
        run: npm ci

      # 3. Run tests before building
      - name: Run tests
        working-directory: genesis-web
        run: npm run test

      # 4. Build the web bundle that Capacitor will embed
      - name: Build Vite app
        working-directory: genesis-web
        run: npm run build

      # 5. Java — required by Gradle / Android build tools
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 6. Android SDK — ubuntu-24.04 runners have the SDK pre-installed.
      #    Accept licences and install platform 35 + matching build-tools.
      - name: Install Android SDK platform 35
        run: |
          SDK_ROOT=$ANDROID_SDK_ROOT
          SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"

          yes | "$SDKMANAGER" --sdk_root="$SDK_ROOT" --licenses > /dev/null 2>&1 || true

          "$SDKMANAGER" --sdk_root="$SDK_ROOT" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools"

          if [ ! -d "$SDK_ROOT/platforms/android-35" ]; then
            echo "ERROR: platforms;android-35 was not installed" && exit 1
          fi
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$SDK_ROOT"     >> "$GITHUB_ENV"

      # 7. Scaffold the Android project via Capacitor.
      #    'android/' is gitignored because it's generated — we recreate it here.
      - name: Add and sync Capacitor Android platform
        working-directory: genesis-web
        run: |
          npx cap add android
          npx cap sync android

      # 8. Build the APK via Gradle
      - name: Build APK (${{ github.event.inputs.build_type }})
        working-directory: genesis-web/android
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          TASK="assemble$(echo "${BUILD_TYPE^}")"   # assembleDebug or assembleRelease
          ./gradlew "$TASK" --no-daemon --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # 9. Locate the produced APK regardless of flavour subdirectory
      - name: Locate APK
        id: find_apk
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          APK=$(find genesis-web/android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          echo "apk_name=$(basename "$APK")" >> "$GITHUB_OUTPUT"

      # 10. Upload artifact (retained for 30 days)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: genesis-android-${{ github.event.inputs.build_type }}-${{ github.sha }}
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error

      # 11. Job summary
      - name: Build summary
        if: success()
        run: |
          APK="${{ steps.find_apk.outputs.apk_path }}"
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "### Android APK built successfully"               >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |"                            >> $GITHUB_STEP_SUMMARY
          echo "|---|---|"                                        >> $GITHUB_STEP_SUMMARY
          echo "| File | \`${{ steps.find_apk.outputs.apk_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | $SIZE |"                                >> $GITHUB_STEP_SUMMARY
          echo "| Build type | \`${{ github.event.inputs.build_type }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |"             >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |"        >> $GITHUB_STEP_SUMMARY
