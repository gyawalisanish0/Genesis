name: Build Android APK

# ── Triggers ───────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

# ── Jobs ───────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Buildozer — Android debug APK
    runs-on: ubuntu-22.04

    steps:
      # 1. Source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Cache the Buildozer working directory.
      #    Only NDK + p4a recipes are cached (~2.5 GB); the SDK is the runner's
      #    pre-installed copy so we no longer cache it here.
      #    Bump the v-prefix to force a clean cache after SDK changes.
      - name: Cache Buildozer directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-v3-${{ runner.os }}-${{ hashFiles('buildozer.spec', 'requirements.txt') }}

      # 3. System dependencies Buildozer needs on a bare Ubuntu runner
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            python3-pip

      # 4. Install Android SDK platform 35 into the runner's pre-installed SDK.
      #
      #    Strategy:
      #      a) Use the system sdkmanager at the well-known runner path.
      #         Download a pinned copy if the runner image doesn't have it.
      #      b) Accept licences with --sdk_root so the files land in the right
      #         directory for subsequent sdkmanager calls.
      #      c) Install platforms;android-35 and matching build-tools.
      #      d) Create a legacy tools/bin/sdkmanager symlink — buildozer 1.5.0
      #         resolves sdkmanager at the old SDK Tools path, not cmdline-tools.
      #      e) Export ANDROID_SDK_ROOT via GITHUB_ENV so it's available to
      #         every subsequent step (not just the current shell).
      - name: Install Android SDK platform 35
        run: |
          SDK_ROOT=/usr/local/lib/android/sdk
          SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"

          # Download cmdline-tools if sdkmanager is absent on this runner image
          if [ ! -x "$SDKMANAGER" ]; then
            echo "sdkmanager not found — downloading pinned cmdline-tools..."
            mkdir -p "$SDK_ROOT/cmdline-tools"
            wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
                 -O /tmp/ct.zip
            unzip -q /tmp/ct.zip -d /tmp/ct-extract
            mv /tmp/ct-extract/cmdline-tools "$SDK_ROOT/cmdline-tools/latest"
          fi

          echo "sdkmanager version: $("$SDKMANAGER" --version)"

          # Accept all SDK licences non-interactively
          yes | "$SDKMANAGER" --sdk_root="$SDK_ROOT" --licenses > /dev/null 2>&1 || true

          # Install platform 35 + build-tools
          "$SDKMANAGER" --sdk_root="$SDK_ROOT" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools"

          # Hard-fail if the platform directory is still missing
          if [ ! -d "$SDK_ROOT/platforms/android-35" ]; then
            echo "ERROR: platforms;android-35 was not installed — aborting."
            exit 1
          fi
          echo "platform 35 OK: $(ls "$SDK_ROOT/platforms/android-35")"

          # Legacy symlink: buildozer 1.5.0 looks for sdkmanager at
          # tools/bin/sdkmanager (old SDK Tools layout, removed from modern SDKs)
          mkdir -p "$SDK_ROOT/tools/bin"
          ln -sf "$SDKMANAGER" "$SDK_ROOT/tools/bin/sdkmanager"
          echo "legacy symlink: $(ls -la "$SDK_ROOT/tools/bin/sdkmanager")"

          # Export for all later steps
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$SDK_ROOT"      >> "$GITHUB_ENV"

      # 5. Tell buildozer 1.5.0 to use the pre-installed SDK.
      #    buildozer reads android.sdk_path from the [app] section.
      #    Python regex insertion (not sed) guarantees the line lands immediately
      #    after android.api, which is always in [app] — no section-placement bugs.
      - name: Inject android.sdk_path into buildozer.spec
        run: |
          python3 - <<'PYEOF'
          import re, os

          sdk_root = os.environ['ANDROID_SDK_ROOT']
          spec = open('buildozer.spec').read()

          if 'android.sdk_path' not in spec:
              spec = re.sub(
                  r'(android\.api\s*=\s*\d+[ \t]*\n)',
                  r'\1android.sdk_path = ' + sdk_root + '\n',
                  spec,
              )
              open('buildozer.spec', 'w').write(spec)
              print(f"Injected android.sdk_path = {sdk_root}")
          else:
              print("android.sdk_path already present — skipping")

          # Print context lines so the job log confirms placement
          for i, line in enumerate(open('buildozer.spec'), 1):
              if any(k in line for k in ('sdk_path', 'android.api', '[app]', '[buildozer]')):
                  print(f"  {i:3}: {line}", end='')
          PYEOF

      # 6. Pin Buildozer and Cython to known-good versions for Kivy 2.3
      - name: Install Buildozer
        run: |
          pip3 install --upgrade pip
          pip3 install buildozer==1.5.0 cython==0.29.36

      # 7. Build the debug APK
      - name: Build debug APK
        run: buildozer -v android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      # 8. Upload the APK
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: genesis-debug-${{ github.sha }}
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error

      # 9. Job summary
      - name: Report APK size
        if: success()
        run: |
          APK=$(ls bin/*.apk | head -1)
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "### APK built successfully"                  >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |"                       >> $GITHUB_STEP_SUMMARY
          echo "|---|---|"                                   >> $GITHUB_STEP_SUMMARY
          echo "| File | \`$(basename $APK)\` |"            >> $GITHUB_STEP_SUMMARY
          echo "| Size | $SIZE |"                           >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |"         >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |"    >> $GITHUB_STEP_SUMMARY
