name: Build Android APK

# ── Triggers ───────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

# ── Jobs ───────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Buildozer — Android debug APK
    runs-on: ubuntu-22.04

    steps:
      # 1. Source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Cache the Buildozer working directory.
      #    SDK + NDK + p4a recipes total ~3 GB; caching cuts subsequent builds
      #    from ~30 min down to ~5 min.  Prefix v1 so the cache can be manually
      #    busted (bump to v2, v3 …) if the SDK ever becomes corrupted.
      - name: Cache Buildozer directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-v2-${{ runner.os }}-${{ hashFiles('buildozer.spec', 'requirements.txt') }}

      # 3. System dependencies Buildozer needs on a bare Ubuntu runner
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            python3-pip

      # 4. Pre-accept Android SDK licences.
      #
      #    Buildozer manages its own Android SDK at:
      #      .buildozer/android/platform/android-sdk/
      #    It does NOT use the system SDK at /usr/local/lib/android/sdk.
      #
      #    Android SDK licences are plain text files containing SHA-1 hashes.
      #    sdkmanager checks for these files before installing any package.
      #    Pre-seeding them here guarantees sdkmanager never blocks waiting for
      #    interactive input — even if buildozer's android.accept_sdk_license
      #    option has any edge-case failures in version 1.5.0.
      #
      #    These hashes are the stable, well-known acceptance signatures for the
      #    standard Android SDK licence, preview licence, and TV licence.
      - name: Pre-accept Android SDK licences
        run: |
          LICENSES_DIR=".buildozer/android/platform/android-sdk/licenses"
          mkdir -p "$LICENSES_DIR"

          printf "%s\n%s\n%s\n" \
            "8933bad161af4178b1185d1a37fbf41ea5269c55" \
            "d56f5187479451eabf01fb78af6dfcb131a6481e" \
            "24333f8a63b6825ea9c5514f83c2829b004d1fee" \
            > "$LICENSES_DIR/android-sdk-license"

          printf "84831b9409646a918e30573bab4c9c91346d8abd\n" \
            > "$LICENSES_DIR/android-sdk-preview-license"

          printf "33b6937984506f2c2de3cfef0deda041f8da1d54\n" \
            > "$LICENSES_DIR/android-googletv-license"

          echo "Licence files written:"
          ls -la "$LICENSES_DIR"

      # 5. Pin Buildozer and Cython to known-good versions for Kivy 2.3
      - name: Install Buildozer
        run: |
          pip3 install --upgrade pip
          pip3 install buildozer==1.5.0 cython==0.29.36

      # 6. Build the debug APK.
      #    Buildozer downloads its own Android SDK + NDK on first run, installs
      #    platform 33, compiles the app with python-for-android, and signs the
      #    APK with the default debug keystore.
      - name: Build debug APK
        run: buildozer -v android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      # 7. Upload the APK so it can be downloaded from the Actions run page
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: genesis-debug-${{ github.sha }}
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error

      # 8. Print the APK size for a quick sanity check
      - name: Report APK size
        if: success()
        run: |
          APK=$(ls bin/*.apk | head -1)
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "### APK built successfully" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |"       >> $GITHUB_STEP_SUMMARY
          echo "|---|---|"                  >> $GITHUB_STEP_SUMMARY
          echo "| File | \`$(basename $APK)\` |"         >> $GITHUB_STEP_SUMMARY
          echo "| Size | $SIZE |"                        >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |"      >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
