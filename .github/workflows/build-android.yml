name: Build Android APK

# ── Triggers ───────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
      - master
  # Allow manual runs from the Actions tab at any time
  workflow_dispatch:

# ── Jobs ───────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Buildozer — Android debug APK
    runs-on: ubuntu-22.04

    steps:
      # 1. Source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Cache the Buildozer working directory
      #    The platform download (NDK, p4a recipes) is ~3 GB; caching cuts
      #    subsequent builds from ~25 min down to ~5 min.
      #    Cache is invalidated when buildozer.spec or requirements.txt change.
      - name: Cache Buildozer directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec', 'requirements.txt') }}
          # No restore-keys fallback — a partial/broken cache causes subtle SDK
          # errors; it is faster to start clean than to debug corrupted state.

      # 3. System dependencies Buildozer needs on a bare Ubuntu runner
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            python3-pip

      # 4. Ensure Android SDK platform 33 is present in the runner's SDK.
      #    ubuntu-22.04 ships the SDK at /usr/local/lib/android/sdk with
      #    cmdline-tools already installed — we just need to add platform 33
      #    and accept licences non-interactively.
      - name: Install Android SDK platform 33
        run: |
          SDK_ROOT=/usr/local/lib/android/sdk
          SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"

          echo "SDK root : $SDK_ROOT"
          echo "sdkmanager: $SDKMANAGER"

          # Accept all pending licences non-interactively
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true

          # Install platform 33 + matching build-tools if not already present
          "$SDKMANAGER" "platforms;android-33" "build-tools;33.0.2" "platform-tools"

          # Fail fast if the platform still isn't there
          ls -la "$SDK_ROOT/platforms/android-33"

          # Persist the SDK root for all later steps via GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$SDK_ROOT"      >> "$GITHUB_ENV"

      # 5. Tell buildozer 1.5.0 to use the pre-installed SDK.
      #    buildozer reads android.sdk_path from the spec file; it does NOT
      #    honour ANDROID_HOME / ANDROID_SDK_ROOT environment variables.
      #    Appending here keeps the checked-in buildozer.spec clean for local
      #    development (where omitting the key makes buildozer manage its own SDK).
      - name: Point buildozer at the pre-installed SDK
        run: |
          echo ""                                                          >> buildozer.spec
          echo "# ── CI override — injected by workflow, do not commit ──" >> buildozer.spec
          echo "android.sdk_path = $ANDROID_SDK_ROOT"                     >> buildozer.spec

      # 6. Pin Buildozer and Cython to known-good versions for Kivy 2.3
      - name: Install Buildozer
        run: |
          pip3 install --upgrade pip
          pip3 install buildozer==1.5.0 cython==0.29.36

      # 7. Build the debug APK
      #    GENESIS_DEBUG is NOT set — the APK is a clean release-like build.
      #    The debug signing key is the default Android debug keystore (auto-generated).
      - name: Build debug APK
        run: buildozer -v android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      # 8. Upload the APK so it can be downloaded from the Actions run page
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: genesis-debug-${{ github.sha }}
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error

      # 9. Print the APK size for a quick sanity check
      - name: Report APK size
        if: success()
        run: |
          APK=$(ls bin/*.apk | head -1)
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "### APK built successfully" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |"       >> $GITHUB_STEP_SUMMARY
          echo "|---|---|"                  >> $GITHUB_STEP_SUMMARY
          echo "| File | \`$(basename $APK)\` |"        >> $GITHUB_STEP_SUMMARY
          echo "| Size | $SIZE |"                       >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |"     >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
