name: Build Android APK

# ── Triggers ───────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
      - master
  # Allow manual runs from the Actions tab at any time
  workflow_dispatch:

# ── Jobs ───────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Buildozer — Android debug APK
    runs-on: ubuntu-22.04

    steps:
      # 1. Source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Cache the Buildozer working directory
      #    The platform download (SDK, NDK, p4a recipes) is ~3 GB;
      #    caching it cuts subsequent builds from ~25 min down to ~5 min.
      #    Cache is invalidated when buildozer.spec or requirements.txt change.
      - name: Cache Buildozer directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec', 'requirements.txt') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # 3. System dependencies Buildozer needs on a bare Ubuntu runner
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            python3-pip

      # 4. Pre-install Android SDK so buildozer finds API 33 immediately.
      #    The ubuntu-22.04 runner ships ANDROID_SDK_ROOT at /usr/local/lib/android/sdk
      #    but only a subset of platforms are pre-installed.  We use the bundled
      #    sdkmanager to install the exact platform + build-tools buildozer needs,
      #    accepting licences non-interactively before buildozer ever runs.
      - name: Install Android SDK platform 33
        run: |
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"

          # Accept all pending licences non-interactively
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

          # Install the platform + matching build-tools
          sdkmanager \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "platform-tools"

      # 5. Pin Buildozer and Cython to known-good versions for Kivy 2.3
      - name: Install Buildozer
        run: |
          pip3 install --upgrade pip
          pip3 install buildozer==1.5.0 cython==0.29.36

      # 6. Build the debug APK
      #    GENESIS_DEBUG is NOT set here — the APK is a clean release-like build.
      #    The debug signing key is the default Android debug keystore (auto-generated).
      #    Point buildozer at the pre-installed SDK so it doesn't re-download it.
      - name: Build debug APK
        run: buildozer -v android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_HOME: /usr/local/lib/android/sdk

      # 7. Upload the APK so it can be downloaded from the Actions run page
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: genesis-debug-${{ github.sha }}
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error

      # 8. Print the APK size for a quick sanity check
      - name: Report APK size
        if: success()
        run: |
          APK=$(ls bin/*.apk | head -1)
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "### APK built successfully" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| File | \`$(basename $APK)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
