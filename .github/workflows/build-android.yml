name: Build Android APK

# ── Triggers ───────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
      - master
  # Allow manual runs from the Actions tab at any time
  workflow_dispatch:

# ── Jobs ───────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Buildozer — Android debug APK
    runs-on: ubuntu-22.04

    steps:
      # 1. Source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Cache the Buildozer working directory
      #    The platform download (NDK, p4a recipes) is ~3 GB; caching cuts
      #    subsequent builds from ~25 min down to ~5 min.
      #    Cache is invalidated when buildozer.spec or requirements.txt change.
      - name: Cache Buildozer directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec', 'requirements.txt') }}
          # No restore-keys fallback — a partial/broken cache causes subtle SDK
          # errors; it is faster to start clean than to debug corrupted state.

      # 3. System dependencies Buildozer needs on a bare Ubuntu runner
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            python3-pip

      # 4. Set up Android SDK with platform 33.
      #
      #    Two problems to solve:
      #    a) The runner's cmdline-tools layout varies — download a pinned version
      #       so sdkmanager is always available at a known path.
      #    b) Buildozer 1.5.0 looks for sdkmanager at the LEGACY path
      #       $SDK_ROOT/tools/bin/sdkmanager, which no longer exists in modern
      #       Android SDK layouts.  We create a symlink so buildozer can find it.
      - name: Set up Android SDK with platform 33
        run: |
          SDK_ROOT=/usr/local/lib/android/sdk
          CMDLINE_DIR="$SDK_ROOT/cmdline-tools"
          SDKMANAGER="$CMDLINE_DIR/latest/bin/sdkmanager"

          # ── Download cmdline-tools if sdkmanager is missing ──────────────────
          if [ ! -x "$SDKMANAGER" ]; then
            echo "sdkmanager not found — downloading pinned cmdline-tools..."
            mkdir -p "$CMDLINE_DIR"
            wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
                 -O /tmp/cmdline-tools.zip
            unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-unzip
            mv /tmp/cmdline-tools-unzip/cmdline-tools "$CMDLINE_DIR/latest"
          fi

          echo "sdkmanager: $($SDKMANAGER --version)"

          # ── Accept licences & install platform 33 ────────────────────────────
          yes | "$SDKMANAGER" --sdk_root="$SDK_ROOT" --licenses > /dev/null 2>&1 || true
          "$SDKMANAGER" --sdk_root="$SDK_ROOT" \
            "platforms;android-33" "build-tools;33.0.2" "platform-tools"

          # Hard failure if the platform directory is still missing
          if [ ! -d "$SDK_ROOT/platforms/android-33" ]; then
            echo "ERROR: platforms;android-33 was not installed — aborting."
            exit 1
          fi
          echo "platform 33 OK: $(ls "$SDK_ROOT/platforms/android-33")"

          # ── Legacy symlink for buildozer 1.5.0 ───────────────────────────────
          # Buildozer 1.5.0 resolves sdkmanager at tools/bin/sdkmanager (the old
          # SDK Tools layout).  Modern SDKs only ship cmdline-tools; without this
          # symlink buildozer logs "sdkmanager is not installed" and aborts.
          mkdir -p "$SDK_ROOT/tools/bin"
          ln -sf "$SDKMANAGER" "$SDK_ROOT/tools/bin/sdkmanager"
          echo "legacy symlink: $(ls -la "$SDK_ROOT/tools/bin/sdkmanager")"

          # ── Persist SDK root for later steps ─────────────────────────────────
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$SDK_ROOT"      >> "$GITHUB_ENV"

      # 5. Tell buildozer 1.5.0 to use the pre-installed SDK.
      #    buildozer reads android.sdk_path from the [app] section of the spec.
      #    It does NOT honour ANDROID_HOME / ANDROID_SDK_ROOT env vars.
      #    We inject the line before [buildozer] so it lands in [app], not in
      #    the [buildozer] section (appending to end of file would be wrong).
      #    The committed buildozer.spec stays clean for local development.
      - name: Point buildozer at the pre-installed SDK
        run: |
          sed -i "s|\[buildozer\]|# CI override — injected by workflow\nandroid.sdk_path = $ANDROID_SDK_ROOT\n\n[buildozer]|" buildozer.spec
          echo "--- buildozer.spec tail (verify sdk_path placement) ---"
          grep -n "sdk_path\|\[buildozer\]\|\[app\]" buildozer.spec

      # 6. Pin Buildozer and Cython to known-good versions for Kivy 2.3
      - name: Install Buildozer
        run: |
          pip3 install --upgrade pip
          pip3 install buildozer==1.5.0 cython==0.29.36

      # 7. Build the debug APK
      #    GENESIS_DEBUG is NOT set — the APK is a clean release-like build.
      #    The debug signing key is the default Android debug keystore (auto-generated).
      - name: Build debug APK
        run: buildozer -v android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      # 8. Upload the APK so it can be downloaded from the Actions run page
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: genesis-debug-${{ github.sha }}
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error

      # 9. Print the APK size for a quick sanity check
      - name: Report APK size
        if: success()
        run: |
          APK=$(ls bin/*.apk | head -1)
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "### APK built successfully" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |"       >> $GITHUB_STEP_SUMMARY
          echo "|---|---|"                  >> $GITHUB_STEP_SUMMARY
          echo "| File | \`$(basename $APK)\` |"        >> $GITHUB_STEP_SUMMARY
          echo "| Size | $SIZE |"                       >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |"     >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
